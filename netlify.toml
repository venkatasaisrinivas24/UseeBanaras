[build]
  command = "npm run build"
  publish = "dist/client"
  functions = "dist/server"

# Don't redirect static assets
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# Redirect all other requests to the server function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/index"
  status = 200